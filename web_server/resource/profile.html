<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordayna</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="style.css">
  
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <div class="container prof-cont">

    <div>
      <div class="box-medium">
        <div class="row rowcols-2 g-0">
          <div class="col-3" id="pfp-box">
            <div class="col">
              <div class="box-smallest-nb" id="pfp"></div>
            </div>
            <div class="col">
              <div class="box-tiny-nb">
                Profilkép:
                <button onclick="hide_show()" class="change">[Megváltoztatás]</button>
                <br><span id="hide" style="display: none; ">
                  <button onclick="changePfp(1)" class="pfp_ch">1</button><button onclick="changePfp(2)"
                    class="pfp_ch">2</button><button onclick="changePfp(3)" class="pfp_ch">3</button>
                </span>
              </div>
            </div>
          </div>
          <div class="col-9">
            <div class="col">
              <div class="box-small">
                <b>Felhasználónév:</b><br>
                &nbsp;&nbsp;&nbsp;&nbsp; <span id="og_display"></span><br>
                <button class="change" onclick="prepareNameChange()">[Megváltoztatás]</button><br>
                <span id="name_change"></span>
                <b>Email:</b><br>
                &nbsp;&nbsp;&nbsp;&nbsp; <span id="mail_add"></span><br>
                <b>Telefonszám:</b> <br>
                &nbsp;&nbsp;&nbsp;&nbsp; <span id="og_tel"></span><br>
                <button class="change" onclick="preparePhoneChange()">[Megváltoztatás]</button><br>
                <span id="phone_change"></span>
                <b>Jelszó:</b><br>
                <button class="change" onclick="preparePassChange()">[Megváltoztatás]</button><br>
                <span id="pass_change"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <button onclick="signout()" id="signout_button">Kilépés</button>
    <div class="intezmeny-box">
  
      <input type="text" id="new_intezmeny_name"><button onclick="newIntezmeny()">Új intézmény létrehozása</button><br>
      <span id="new_intezmeny_name_err" class="err"></span>
      <span id="intezmeny_list"></span>
      <select id="invites"></select>
      <button onclick="acceptInvite()">Meghívás elfogadása</button>
    </div>
  </div>


  <script src="js/profile.js" type="module"></script>
</body>

</html>
