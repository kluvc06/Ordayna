<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordayna</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="style.css">
  <style>
    .container {
      height: 90%;
      width: 90%;
      margin-left: 2% !important;
    }
  </style>
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <h1>Órarend tervező </h1>
  <select name="class_id" id="groups"></select>

  <div class="container ">
    <div class="row ">

      <div class="col-2">
        <div class="box">
          <p class="h6">Tanárok</p>
          <hr>
          <select name="sometext" size="15" class="listbox" id="tanar_option" onchange="addItem(this, 'tanar')">
          </select>
        </div>
      </div>
      <div class="col-2">
        <div class="box">
          <p class="h6">Tantárgyak</p>
          <hr>
          <select name="sometext" size="15" class="listbox" id="tantargy_option" onchange="addItem(this, 'targy')">
          </select>
        </div>
      </div>
      <div class="col-8">
        <div class="box">
          <table id="bitch_table">
            <tr>
              <td class="h3">Órarend</td>
              <td id="bitch_move">
                <label for="days">Nap kiválasztása:</label>
                <select id="days">
                  <option value="Hétfő">Hétfő</option>
                  <option value="Kedd">Kedd</option>
                  <option value="Szerda">Szerda</option>
                  <option value="Csütörtök">Csütörtök</option>
                  <option value="Péntek">Péntek</option>
                </select>
              </td>
            </tr>
          </table>
          <hr>
          <select name="sometext" size="15" class="listbox" id="orarend_box"></select>
          <div class="input-div">
            <select id="get_id" style="display: none;"></select>
            <button onclick="deleteData()">&lt;-</button>
            <button onclick="lockData()">-&gt;</button>
            <input type="text" id="targy" readonly>
            <input type="text" id="terem" readonly>
            <input type="text" id="tanar" readonly>
            <br><button onclick="">done</button><button onclick="allClear()">all clear</button>
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <p></p>
    </div>
    <div class="row">
      <div class="col-5 ">
        <div class="box-small">
          <p class="h6">Termek</p>
          <hr>
          <select name="sometext" size="5" class="listbox" id="terem_option" onchange="addItem(this, 'terem')">
          </select>
        </div>
      </div>
      <div class="col-3">
        <div class="box-small">
          <p class="h6">Órák száma: <span id="orak_szama_tc"></span></p>
          <hr>
          <p class="h6">Osztály: <span id="osztaly_tc"></span></p>
          <hr>
          <p class="h6">Nyelv: <span id="nyelv_tc"></span></p>
          <hr>
          <p class="h6">Csoport: <span id="csoport_tc"></span></p>
        </div>
      </div>
      <div class="col-4">
        <div class="box-small">
          <p class="h6">Visszajelzés</p>
          <hr>
          <span id="err"></span>
        </div>
      </div>

    </div>
  </div>

  <br><button onclick="location.replace('home.html')" id="home_button">home</button>
  <button onclick="location.replace('profile.html')" id="user_button">Felhasználó</button>

  <script src="js/time_create.js" type="module"></script>
</body>

</html>
