<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordayna</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="style.css">
  <style>
   
  </style>
</head>

<body>
  <div class="header row">

    <div id="i-name" class="col">{Baranya Vármegyei SZC Radnóti Miklós Közgazdasági Technikum} {"Admin"} </div>
    <div class="right-btn col"><button onclick="location.replace('profile.html')" id="user_button">Felhasználó</button>
    </div>

  </div>

  <h1>Órarend tervező </h1>

  <div class="container tt-c">
  <div class="row g-2">

    <div class="col-12 col-md-6 col-lg-3">
      <div class="box">
        <p class="h6">Tanárok</p>
        <hr>
        <select size="15" class="listbox w-100" id="tanar_option"></select>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-3">
      <div class="box">
        <p class="h6">Tantárgyak</p>
        <hr>
        <select size="15" class="listbox w-100" id="tantargy_option"></select>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-3">
      <div class="box">
        <p class="h6">Termek</p>
        <hr>
        <select size="15" class="listbox w-100" id="terem_option"></select>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-3">
      <div class="box">
        <p class="h6">Csoportrok</p>
        <hr>
        <select size="15" class="listbox w-100" id="groups"></select>
      </div>
    </div>

    <div class="col-12">
      <div class="box">
        <div class="table-responsive">
          <table id="bitch_table" class="w-100">
            <tr>
              <td class="h3">Órarend</td>
              <td id="bitch_move">
                <label for="day_filter">Nap kiválasztása:</label>
                <select id="day_filter" onchange="updateTimetable()" class="form-select">
                  <option value="-1">Összes</option>
                  <option value="0">Hétfő</option>
                  <option value="1">Kedd</option>
                  <option value="2">Szerda</option>
                  <option value="3">Csütörtök</option>
                  <option value="4">Péntek</option>
                  <option value="5">Szombat</option>
                  <option value="6">Vasárnap</option>
                </select>
              </td>
            </tr>
          </table>
        </div>

        <hr>

        <div class="listbox w-100" id="orarend_box"></div>

        <div class="input-div mt-3">
          <div class="table-responsive">
            <table class="w-100">
              <tr>
                <th>Tanóra id</th>
                <th>Tanóra kezdete</th>
                <th>Tanóra tartama</th>
                <th>Tanóra napja</th>
                <th>Kezdete</th>
                <th>Vége</th>
                <th></th>
                <th></th>
              </tr>
              <tr>
                <td><select id="get_id" class="form-select"></select></td>
                <td><input type="text" id="start" placeholder="hh:mm:ss" class="form-control"></td>
                <td><input type="text" id="duration" placeholder="hh:mm:ss" class="form-control"></td>
                <td>
                  <select id="day" class="form-select">
                    <option value="0">Hétfő</option>
                    <option value="1">Kedd</option>
                    <option value="2">Szerda</option>
                    <option value="3">Csütörtök</option>
                    <option value="4">Péntek</option>
                    <option value="5">Szombat</option>
                    <option value="6">Vasárnap</option>
                  </select>
                </td>
                <td><input type="text" id="from" placeholder="YYYY-MM-DD" class="form-control"></td>
                <td><input type="text" id="until" placeholder="YYYY-MM-DD" class="form-control"></td>
                <td><button onclick="deleteData()" class="btn btn-danger btn-sm">🗑</button></td>
                <td><button onclick="lockData()" class="btn btn-success btn-sm">+</button></td>
              </tr>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12">
      <div class="box-smaller">
        <p class="h6">Visszajelzés</p>
        <hr>
        <span id="err"></span>
      </div>
    </div>

  </div>
</div>
  </div>

  <br><button onclick="location.replace('home.html')" id="home_button">home</button>

  <!-- <script src="js/time_create.js" type="module"></script> -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
