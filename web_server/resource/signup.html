<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordayna</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="js/signup_login.js" type="module"></script>
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>


  <div id="center_align">
    <h1>Ordayna</h1>
    <h2>Regisztráció</h2>
    <form>
      <label for="signup_display_name">Felhasználónév</label><br>
      <input type="text" id="signup_display_name"><br>

      <label for="signup_email">E-mail</label><br>
      <input type="email" id="signup_email"><br>

      <label for="signup_tel">Telefonszám</label><br>
      <input type="text" id="signup_tel" placeholder="36301234567"><br>

      <label for="signup_pass_1">Jelszó</label><br>
      <input type="password" id="signup_pass_1"><br>
      <label for="signup_pass_2">Jelszó újra</label><br>
      <input type="password" id="signup_pass_2"><br>
    </form>

    <div id="please_be_centered">
      <button onclick="signup()" id="signup_button">Regisztráció</button><br>
      <button onclick="location.href='login.html'" id="to_login_button">Belépés</button>
    </div>

    <div class="errors">
      <span id="signup_display_name_err" class="err"></span>
      <span id="signup_email_err" class="err"></span>
      <span id="signup_tel_err" class="err"></span>
      <span id="signup_pass_1_err" class="err"></span>
      <span id="signup_pass_2_err" class="err"></span>
    </div>
  </div>

</body>
