<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordayna</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="style.css">

</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <div class="header row">

    <div id="i-name" class="col"></div>
    <div class="right-btn col"><button onclick="location.replace('profile.html')" id="user_button">Felhasználó</button>
    </div>

  </div>

  <h1>Házi feladat</h1>
  <select size="10" id="groups" onchange="updateHomeworks()"></select>
  <div class="container hw-s">
  <div class="row g-2">

    <div class="col-12 col-md-2" id="border">
      <div class="box-long">
        <p class="h6">Tantárgyak</p>
        <hr>
        <select name="sometext" size="26" class="listbox" id="tantargy" onchange="loadHomeworks(this)"></select>
      </div>
    </div>

    <div class="col-12 col-md-10 g-1">

      <div class="row mb-2">
        <div class="col-12" id="border">
          <div class="box-small">
            <p class="h6">Feladatok</p>
            <hr>
            <div id="feladatok"></div>
          </div>
        </div>
      </div>

      <div class="row g-2">
        <div class="col-12 col-md-9" id="border">
          <div class="box">
            <p class="h6">Feladat leírás</p>
            <hr>
            <div id="feladatok_leiras"></div>
          </div>
        </div>

        <div class="col-12 col-md-3" id="border">
          <div class="box">
            <p class="h6">Leadás</p>
            <hr>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
    <button onclick="returnHome()" id="home_button">home</button>
  </div>

  <script src="js/homework_stud.js" type="module"></script> 
</body>

</html>
