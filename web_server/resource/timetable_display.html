<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordayna</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

  <div class="header row">

    <div id="i-name" class="col">{Baranya Vármegyei SZC Radnóti Miklós Közgazdasági Technikum} {"Admin"} </div>
    <div class="right-btn col"><button onclick="location.replace('profile.html')" id="user_button">Felhasználó</button>
    </div>

  </div>
  
  <h1>Órarend</h1>

  <button class="d-lg-none mb-2 csoportok-btn" data-bs-toggle="offcanvas" data-bs-target="#rightSidebar">
    Csoportok
  </button>

  <div class="container-fluid">
    <div class="row g-2">

      <div class="col-12 col-lg-10">
        <div class="box-long-nb">

          <div class="row g-2">

            <div class="col-12 col-sm-6 col-md-4 col-lg">
              <div class="box-long">
                <p class="h6">Hétfő</p>
                <hr>
                <div id="day_0"></div>
              </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg">
              <div class="box-long">
                <p class="h6">Kedd</p>
                <hr>
                <div id="day_1"></div>
              </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg">
              <div class="box-long">
                <p class="h6">Szerda</p>
                <hr>
                <div id="day_2"></div>
              </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg">
              <div class="box-long">
                <p class="h6">Csütörtök</p>
                <hr>
                <div id="day_3"></div>
              </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg">
              <div class="box-long">
                <p class="h6">Péntek</p>
                <hr>
                <div id="day_4"></div>
              </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg">
              <div class="box-long">
                <p class="h6">Szombat</p>
                <hr>
                <div id="day_5"></div>
              </div>
            </div>

            <div class="col-12 col-sm-6 col-md-4 col-lg">
              <div class="box-long">
                <p class="h6">Vasárnap</p>
                <hr>
                <div id="day_6"></div>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div class="col-lg-2 d-none d-lg-block">
        <div class="box-long">
          <p class="h6">Csoportok</p>
          <hr>
          <div class="listbox" id="classes_"></div>
        </div>
      </div>

    </div>
  </div>

  <div class="offcanvas offcanvas-end d-lg-none" tabindex="-1" id="rightSidebar">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Csoportok</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <div class="box-long">
        <p class="h6">Csoportok</p>
        <hr>
        <div class="listbox" id="classes_"></div>
      </div>
    </div>
  </div>

  <button onclick="returnHome()" id="home_button">Home</button>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
