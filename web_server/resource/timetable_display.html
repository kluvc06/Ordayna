<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordayna</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body onload="generateContentForDisplay()">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <button onclick="location.replace('profile.html')" id="user_button">Felhasználó</button>

  <h1>Órarend</h1>
  <div class="container-fluid">
    <div class="row g-2">

      <div class="col-10">
        <div class="box-long-nb">
          <div class="row g-1">
            <div class="col">
              <div class="box-long">
                <p class="h6">Hétfő</p>
                <hr>
              </div>
            </div>
            <div class="col">
              <div class="box-long">
                <p class="h6">Kedd</p>
                <hr>
              </div>
            </div>
            <div class="col">
              <div class="box-long">
                <p class="h6">Szerda</p>
                <hr>
              </div>
            </div>
            <div class="col">
              <div class="box-long">
                <p class="h6">Csütörtök</p>
                <hr>
              </div>
            </div>
            <div class="col">
              <div class="box-long">
                <p class="h6">Péntek</p>
                <hr>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-2">
        <div class="box-long-nb">
          <div class="box-smallest" style="margin-bottom:0.8em">
            <p class="h6">Osztály: <span id="osztaly_td"></span></p>
            <hr>
            <p class="h6">Nyelv: <span id="nyelv_td"></span></p>
            <hr>
            <p class="h6">Csoport: <span id="csoport_td"></span></p>
          </div>
          <select name="sometext" size="20" class="listbox" id="classes_" onchange="loadTimetable(this)">
          </select>
        </div>

      </div>
    </div>
  </div>

  <button onclick="location.replace('home.html')" id="home_button">Home</button>

  <script src="js/time_display.js"></script>
</body>

</html>
