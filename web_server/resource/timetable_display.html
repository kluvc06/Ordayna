<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordayna</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
  <button onclick="location.replace('profile.html')" id="user_button">Felhasználó</button>

  <h1>Órarend</h1>
  <div class="container-fluid">
    <div class="row g-2">

      <div class="col-10">
        <div class="box-long-nb">
          <div class="row g-1">
            <div class="col">
              <div class="box-long">
                <p class="h6">Hétfő</p>
                <hr>
                <div id="day_0"></div>
              </div>
            </div>
            <div class="col">
              <div class="box-long">
                <p class="h6">Kedd</p>
                <hr>
                <div id="day_1"></div>
              </div>
            </div>
            <div class="col">
              <div class="box-long">
                <p class="h6">Szerda</p>
                <hr>
                <div id="day_2"></div>
              </div>
            </div>
            <div class="col">
              <div class="box-long">
                <p class="h6">Csütörtök</p>
                <hr>
                <div id="day_3"></div>
              </div>
            </div>
            <div class="col">
              <div class="box-long">
                <p class="h6">Péntek</p>
                <hr>
                <div id="day_4"></div>
              </div>
            </div>
            <div class="col">
              <div class="box-long">
                <p class="h6">Szombat</p>
                <hr>
                <div id="day_5"></div>
              </div>
            </div>
            <div class="col">
              <div class="box-long">
                <p class="h6">Vasárnap</p>
                <hr>
                <div id="day_6"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-2">
        <div class="box-long">
          <p class="h6">Csoportok</p>
          <hr>
          <div class="listbox" id="classes_"></div>
        </div>

      </div>
    </div>
  </div>

  <button onclick="returnHome()" id="home_button">Home</button>

  <script src="js/time_display.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
