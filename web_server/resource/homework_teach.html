<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordayna</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

  <div class="header row">

    <div id="i-name" class="col"></div>
    <div class="right-btn col"><button onclick="location.replace('profile.html')" id="user_button">Felhasználó</button>
    </div>

  </div>

  <h1>Házi feladat(teacher)</h1>
  <div class="container hw-t">
    <div class="row g-2">
      <div class="col-2">
        <div class="box-long">
          <p class="h6">Osztályok</p>
          <hr>
          <select class="listbox w-100" id="groups" size="15" onchange="updateHomeworks()"></select>
        </div>
      </div>
      <div class="col-10 g-2">
        <div class="col">
          <div class="box-smaller">
            <p class="h6">Feladatok kiadás</p>
            <hr>
            <select id="choice" onchange="refill()"></select>
            <input type="text" id="new_description">
            <input type="text" id="new_due" placeholder="YYYY-MM-DD hh:mm:ss">
            <select id="new_lesson"></select>
            <select id="new_teacher"></select>
            <button onclick="deleteHomework()">🗑</button>
            <button onclick="newHomework()">+</button>
            <div id="err"></div>
          </div>
        </div>
        <div class="row rowcols-2 g-0">
          <div class="col-9">
            <div class="box-medium">
              <p class="h6">Feladat leírás</p>
              <hr>
            </div>
          </div>
          <div class="col-3">
            <div class="box-medium">
              <p class="h6">Leadás</p>
              <hr>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="box-smaller">
            <p class="h6">Kiadott Feladatok</p>
            <hr>
            <div id="homeworks"></div>
          </div>
        </div>
      </div>
    </div>
    <br><button onclick="returnHome()" id="home_button">home</button>
  </div>
  <script src="js/homework_teach.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
