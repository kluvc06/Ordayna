<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordayna</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

  <div class="header row">

    <div id="i-name" class="col"></div>
    <div class="right-btn col"><button onclick="location.replace('profile.html')" id="user_button">Felhasználó</button>
    </div>

  </div>

  <h1>Házi feladat kiadás</h1>
  <div class="container hw-t">
    <div class="row g-2">
      <div class="col-12 col-md-2">
        <div class="box-long">
          <p class="h6">Csoportok</p>
          <hr>
          <select class="listbox w-100" id="groups" size="15" onchange="updateHomeworks()"></select>
        </div>
      </div>
      <div class="col-10 g-2">
        <div class="col">
          <div class="box-smaller">
            <p class="h6">Feladatok kiadás</p>
            <hr>

            <div class="input-div mt-3">
            <div class="table-responsive">
              <table class="w-100">
                <tr>
                  <th>Feladat id</th>
                  <th>Tantárgy</th>
                  <th>Tanár</th>
                  <th>Határidő</th>
                  <th></th>
                  <th></th>
                </tr>
                <tr>
                  <td><select id="choice" onchange="refill()" class="form-select"></select></td>
                  <td>
                    <select id="new_lesson" class="form-select"></select>
                  </td>
                  <td>
                    <select id="new_teacher" class="form-select"></select>
                  </td>
                  <td><input type="text" id="new_due" placeholder="YYYY-MM-DD hh:mm:ss" class="form-control"></td>
                  <td><button onclick="deleteHomework()" class="btn btn-danger btn-sm">🗑</button></td>
                  <td><button onclick="newHomework()" class="btn btn-success btn-sm">+</button></td>
                </tr>
              </table>
            </div>
          </div>

            
            
            

            <div id="err"></div>
          </div>
        </div>
        <div class="row rowcols-2 g-0">
          <div class="col">
            <div class="box-medium">
              <p class="h6">Feladat leírás</p>
              <hr>
                

                <textarea rows="10" cols="30" id="new_description"></textarea>
            </div>
          </div>
          
        </div>
        <div class="col">
          <div class="box-smaller">
            <p class="h6">Kiadott Feladatok</p>
            <hr>
            <div id="homeworks"></div>
          </div>
        </div>
      </div>
    </div>
    <br><button onclick="returnHome()" id="home_button">home</button>
  </div>
  <script src="js/homework_teach.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
